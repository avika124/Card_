name: Compliance Agent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 python-fastapi/ streamlit/ scripts/ --max-line-length=120 --ignore=E501,W503
      - name: Check black formatting
        run: black --check python-fastapi/ streamlit/ scripts/ --line-length=120

  lint-node:
    name: Lint Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: nodejs-express
        run: npm install
      - name: Check syntax
        working-directory: nodejs-express
        run: node --check server.js routes/check.js routes/docx.js lib/compliance.js lib/docxGenerator.js

  test-python:
    name: Test Python (FastAPI)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: python-fastapi
        run: pip install -r requirements.txt pytest httpx
      - name: Run import checks
        working-directory: python-fastapi
        run: python -c "from compliance import REGULATIONS, check_text; from docx_generator import generate_compliance_docx; print('All imports OK')"

  test-node:
    name: Test Node.js
    runs-on: ubuntu-latest
    needs: lint-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: nodejs-express
        run: npm install
      - name: Run import checks
        working-directory: nodejs-express
        run: node -e "const c = require('./lib/compliance'); const d = require('./lib/docxGenerator'); console.log('Node imports OK');"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-python, test-node]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build FastAPI image
        run: docker build -f python-fastapi/Dockerfile -t compliance-agent-api:test . || echo "No Dockerfile yet — skipping"
